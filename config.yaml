app:
  name: "Process Factor Finder v3"
  language: "ko"
  target_python: "3.12"

data:
  preview_rows: 100
  preview_max_columns: 80

screening:
  top_n_per_y: 100
  detailed_top_n: 300
  final_top_n: 30

presets:
  빠른 탐색:
    top_n_per_y: 50
    detailed_top_n: 100
    final_top_n: 20
  균형:
    top_n_per_y: 100
    detailed_top_n: 300
    final_top_n: 30
  정밀:
    top_n_per_y: 200
    detailed_top_n: 800
    final_top_n: 50

numeric_matrix_screening:
  enabled: true
  method: "pearson"
  dtype: "float32"
  missing_strategy: "mean_impute"
  x_chunk_size: 5000
  y_chunk_size: 50
  min_variance: 1e-12
  max_missing_rate: 0.7

categorical_matrix_screening:
  enabled: true
  max_category_levels: 30
  min_samples_per_level: 5
  rare_level_min_ratio: 0.01
  rare_level_label: "__OTHER__"
  missing_label: "__MISSING__"
  drop_id_like_columns: true
  high_cardinality_policy: "drop"
  use_sparse: true

scoring:
  score_min: 0
  score_max: 100
  validate_scores: true
  weights:
    statistical: 0.28
    effect: 0.26
    model: 0.18
    stability: 0.18
    quality: 0.10

ui:
  max_table_rows: 100
  max_result_rows: 100
  progress_update_interval_sec: 0.2

artifacts:
  save_top_graphs: true
  top_graph_n: 30
  save_page_capture: true
  graph_format: "png"
  output_root: "output"
